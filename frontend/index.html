<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <title>RawReservoirClassifier</title>
        <script>
            // Set the `dark` class before first paint (reading the persisted
            // preference, falling back to OS preference) so there's no flash
            // of the wrong theme -- see src/theme/ThemeContext.tsx, which is
            // the source of truth for this same logic post-hydration.
            (function () {
                var stored = localStorage.getItem("theme");
                var dark =
                    stored === "dark" ||
                    (!stored && window.matchMedia("(prefers-color-scheme: dark)").matches);
                if (dark) document.documentElement.classList.add("dark");
            })();
        </script>
    </head>
    <body class="bg-surface text-ink">
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
